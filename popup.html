<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spotify Ad Monitor</title>
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 16px;
        color: #111827;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 6px;
        padding: 9px 10px;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      #startButton {
        background: #137333;
      }

      #stopButton {
        background: #b3261e;
      }

      #statusText {
        min-height: 18px;
        margin: 0;
        color: #4b5563;
        font-size: 13px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>Spotify Ad Monitor</h1>
    <div class="controls">
      <button id="startButton" type="button">Start</button>
      <button id="stopButton" type="button">Stop</button>
    </div>
    <p id="statusText">Stopped</p>

    <script src="popup.js"></script>
  </body>
</html>
